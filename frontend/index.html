<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%232563EB'/><rect x='7' y='9' width='18' height='3.5' rx='1.75' fill='white'/><rect x='7' y='14.5' width='12' height='3.5' rx='1.75' fill='white'/><rect x='7' y='20' width='7' height='3.5' rx='1.75' fill='white'/></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Feedora — share blogs, posts, and articles with the world" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#030712"  media="(prefers-color-scheme: dark)" />
    <meta property="og:title"       content="Feedora" />
    <meta property="og:description" content="Share blogs, posts, and articles with the world" />
    <meta property="og:type"        content="website" />
    <title>Feedora</title>
    <!-- Apply dark class before React renders to prevent flash of wrong theme -->
    <script>
      (function () {
        var stored = localStorage.getItem('theme')
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        if (stored === 'dark' || (!stored && prefersDark)) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
